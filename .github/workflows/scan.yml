name: Finviz Momentum Scan

on:
  schedule:
    # 13:00, 17:00, 21:00 UTC Mon–Fri  (roughly pre-open, mid-session, after-close ET)
    - cron: '0 13,17,21 * * 1-5'
  workflow_dispatch:

# Prevent two runs from racing on state.db — queue, never cancel.
concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push state.db back

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Run scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FINVIZ_DB_PATH: state.db
        run: uv run python -m finviz_screener scan

      - name: Commit state.db
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.db
          git diff --staged --quiet || git commit -m "chore: run @ $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push
