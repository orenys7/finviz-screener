name: Deploy Dashboard

on:
  workflow_run:
    workflows: ["Finviz Momentum Scan"]
    types: [completed]
  push:
    branches: [master]
    paths:
      - "web/**"
      - "src/finviz_screener/exporter.py"
      - "src/finviz_screener/models.py"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Export JSON data
        run: uv run finviz-screener export --db state.db --out web/public/data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        working-directory: web

      - run: npm run build
        working-directory: web

      - name: Copy data into dist
        run: cp -r web/public/data web/dist/data

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
