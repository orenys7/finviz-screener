# model: claude-* uses Anthropic; gemini-* uses Google. Default: claude-sonnet-4-6.
model: gemini-2.5-pro
score_threshold: 8       # Discord-notification cutoff (>= this counts as a "new hit")
min_score_to_store: 7    # DB storage cutoff (scores below this are dropped before INSERT)
lookback_runs: 6

